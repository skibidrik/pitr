name: Build Ghost ESP Fixed
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch Framework Settings
        run: |
          echo "CONFIG_COMPILER_CXX_EXCEPTIONS=y" >> sdkconfig
          echo "CONFIG_COMPILER_ERRORS_TREAT_WARNINGS_AS_ERRORS=n" >> sdkconfig

      - name: Build with ESP-IDF
        run: |
          export EXTRA_CFLAGS="-w"
          export EXTRA_CXXFLAGS="-w"
          # Используем команду напрямую для сборки проекта
          . /opt/esp/idf/export.sh
          idf.py build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-esp-bin
          path: build/
