name: Build Ghost ESP Fixed
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch Framework Settings
        run: |
          echo "CONFIG_COMPILER_CXX_EXCEPTIONS=y" >> sdkconfig
          echo "CONFIG_COMPILER_ERRORS_TREAT_WARNINGS_AS_ERRORS=n" >> sdkconfig
          echo "CONFIG_COMPILER_OPTIMIZATION_ASSERTIONS_DISABLE=y" >> sdkconfig

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1.2
          target: esp32
          path: '.'

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-esp-bin
          path: build/
